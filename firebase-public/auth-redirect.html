<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #a78bfa;
    }
    .msg {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin: 0; font-size: 15px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Opening your account page…</p>
  </div>
  <script>
    // Forward ALL query parameters to the Vercel React app
    var params = window.location.search;
    window.location.replace('https://ai-powered-uicodegen.vercel.app/auth-action' + params);
  </script>
</body>
</html>
